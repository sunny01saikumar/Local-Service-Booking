spring:
  application:
    name: localhub
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/geoLocation
    username: postgres
    password: Sunny1631
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
server:
  port: 8080
  servlet:
    context-path: /
app:
  security:
    jwt-secret: ${JWT_SECRET:localhub-development-secret-key-change-me-localhub-development-secret-key}
    jwt-expiration-minutes: 60
    refresh-expiration-days: 30
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
