spring:
  datasource:
    url: jdbc:h2:mem:localhub;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
app:
  security:
    jwt-secret: localhub-test-secret-key-localhub-test-secret-key-localhub-test-secret-key
    jwt-expiration-minutes: 60
