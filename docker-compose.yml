services:
  postgres:
    image: postgres:16-alpine
    container_name: localhub-postgres
    environment:
      POSTGRES_DB: localhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: localhub-redis
    ports:
      - "6379:6379"
  api:
    build: .
    container_name: localhub-api
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/localhub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: localhub-development-secret-key-change-me-localhub-development-secret-key
    ports:
      - "8080:8080"
volumes:
  postgres_data:
