services:
  redis:
    image: redis:7-alpine
    container_name: localhub-redis
    ports:
      - "6379:6379"
  api:
    build: .
    container_name: localhub-api
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://host.docker.internal:5432/geoLocation
      DB_USERNAME: postgres
      DB_PASSWORD: Sunny1631
      JWT_SECRET: localhub-development-secret-key-change-me-localhub-development-secret-key
    ports:
      - "8080:8080"
